<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HerForce - Knowledge in XR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
    }

    /* FIX: Corrected the anchor link scrolling issue. */
    /* This rule ensures that when navigating to a section, there's a top margin */
    /* equal to the header's height, preventing the section title from being hidden. */
    /* Increased specificity and added !important to ensure it always applies. */
    #root main section[id] {
      scroll-margin-top: 80px !important;
    }

    /* Sakura Petal Animation */
    .sakura-petal {
        position: absolute;
        top: -20px; /* Start above the screen */
        background-color: rgba(247, 168, 184, 0.7); /* #f7a8b8 with opacity */
        border-radius: 50% 0;
        opacity: 0.9;
        animation: fall linear infinite;
        pointer-events: none; /* Make sure they don't block clicks */
    }

    @keyframes fall {
        0% {
            transform: translateY(0) rotate(0deg) translateX(0);
            opacity: 0.9;
        }
        100% {
            transform: translateY(105vh) rotate(720deg) translateX(20vw);
            opacity: 0;
        }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="importmap">
  {
    "imports": {
      "react": "https://aistudiocdn.com/react@^19.2.0",
      "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
      "react/": "https://aistudiocdn.com/react@^19.2.0/",
      "@google/genai": "https://aistudiocdn.com/@google/genai@^1.27.0"
    }
  }
  </script>
  <script type="module" src="index.tsx"></script>
</body>
</html>
